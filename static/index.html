<!-- Editor page: 9:16 preview stage, clip list, controls. Logic in editor.js/preview.js. -->
<!doctype html><html data-theme="dark"><head><meta charset="utf-8"><title>Reels Editor</title>
<link rel="stylesheet" href="/static/css/tokens.css">
<link rel="stylesheet" href="/static/css/base.css">
<link rel="stylesheet" href="/static/css/layout.css">
<link rel="stylesheet" href="/static/css/components/panel.css">
<link rel="stylesheet" href="/static/css/components/stage.css">
</head><body>
<div id="app">
  <header id="topbar">
    <div id="brand">
      <span id="brand-dot"></span>
      <span id="brand-name">REEL</span>
      <span id="brand-tag">LOCAL</span>
    </div>
    <div id="topbar-divider"></div>
    <div id="project-name"></div>
    <div id="topbar-spacer"></div>
    <button id="export">EXPORT &middot; 1080&times;1920</button>
  </header>
  <main>
    <aside id="panel">
      <div class="panel-header">MEDIA</div>
      <div id="panel-add">
        <input id="clip-path" placeholder="C:\path\to\clip.mp4">
        <button id="add-clip">+ IMPORT VIDEO</button>
      </div>
      <ol id="clip-list"></ol>
      <div class="panel-header">TEXT</div>
      <div id="text-panel">
        <input id="text-heading" placeholder="Heading">
        <div class="text-row">
          <label>Start <input id="text-start" type="number" step="0.1"></label>
          <label>End <input id="text-end" type="number" step="0.1"></label>
        </div>
        <div class="text-row">
          <label>Size <input id="text-size" type="range" min="24" max="200"></label>
        </div>
        <div class="text-row">
          <label>Color <input id="text-color" type="color"></label>
          <label>Outline <input id="text-outline-color" type="color"></label>
          <label>Width <input id="text-outline-px" type="number" min="0" max="20"></label>
        </div>
        <div class="text-row">
          <label><input id="text-box" type="checkbox"> Box</label>
          <label>Box color <input id="text-box-color" type="color"></label>
        </div>
        <div class="text-row">
          <label>Align
            <select id="text-align">
              <option value="left">Left</option>
              <option value="center">Center</option>
              <option value="right">Right</option>
            </select>
          </label>
        </div>
        <div class="text-row">
          <label>X <input id="text-x" type="range" min="0" max="1080"></label>
        </div>
        <div class="text-row">
          <label>Y <input id="text-y" type="range" min="0" max="1920"></label>
        </div>
      </div>
    </aside>
    <section id="stage-wrap">
      <div id="stage"><video id="player"></video><div id="overlay"></div></div>
      <div id="transport"><button id="play">&#9654;</button><span id="time">0.0</span></div>
      <div id="export-result"></div>
    </section>
  </main>
</div>
<script src="/static/preview.js"></script><script src="/static/editor.js"></script>
</body></html>
